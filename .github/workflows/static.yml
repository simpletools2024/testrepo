name: Inject AppJS and Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps:deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject script tag in HTML files
        run: |
          # Dit zoekt alle .html bestanden en plakt de script-tag voor de </body> tag
          # Als er geen </body> is, plakt hij het gewoon onderaan de file.
          find . -type f -name "*.html" -not -path "./.git/*" -exec sed -i 's|</body>|<script src="/testrepo/app.js"></script></body>|g' {} +
          
          # Voor de zekerheid: als een file geen </body> heeft, voeg het toe aan het einde
          find . -type f -name "*.html" -not -path "./.git/*" -exec grep -q "<script src=\"/testrepo/app.js\">" {} || echo '<script src="/testrepo/app.js"></script>' >> {} +

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
