name: Inject AppJS and Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject script tag in HTML files
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          SCRIPT_TAG="<script src='/$REPO_NAME/app.js'></script>"
          
          echo "Injecting: $SCRIPT_TAG"
          
          find . -type f -name "*.html" -not -path "./.git/*" -exec sh -c "echo '$SCRIPT_TAG' | cat - \"\$1\" > temp && mv temp \"\$1\"" _ {} \;
          
          echo "Injection complete."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
