name: Inject Path Log

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# DEZE SECTIE IS CRUCIAAL:
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps:deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Code in JS files
        run: |
          # Injecteer de console log bovenaan elk JS bestand
          find . -type d -path './.git' -prune -o -type f -name "*.js" -exec sed -i '1i console.log("Bestand geladen: " + import.meta.url);' {} +

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
