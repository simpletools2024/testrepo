name: Inject AppJS and Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject script tag in HTML files
        run: |
          # Dit zoekt alle .html bestanden. 
          # Het plakt de script-tag aan het EINDE van elk bestand.
          # Zo werkt het altijd, of je nu een <body> tag hebt of niet.
          find . -type f -name "*.html" -not -path "./.git/*" -exec sh -c 'echo "<script src=\"/${{ github.event.repository.name }}/app.js\"></script>" >> "$1"' _ {} +
          echo "Injectie voltooid."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
